<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>乐城生物技术评估器</title><style>

</style></head><body><header><nav><span class="logo">LC</span><b>乐城生物技术评估器</b><i>公开数据 · 零 API 费用</i></nav><div class="hero"><small>LECHENG BIOTECH SIGNAL SCAN</small><h1>从公开证据中，<br><em>发现值得推进的项目。</em></h1><p>联网查询临床试验、医学论文与药品标签，以固定透明的规则完成项目初筛。</p></div></header><main><section class="work"><form id="form"><div class="title"><span>01</span><h2>项目检索</h2><i>● 实时公开数据</i></div><label>产品 / 技术名称 *<input id="product" required placeholder="例如：lifileucel"></label><label>研发公司 *<input id="company" required placeholder="建议输入公司英文全称"></label><label>补充信息（可选）<textarea id="notes" rows="4" placeholder="适应症、研发代号、上市国家等"></textarea></label><p id="error" class="error" hidden></p><button id="submit">开始联网评估 →</button><p class="hint">不注册、不调用付费模型；查询内容只用于本次检索。</p></form><aside><span>02</span><h2>透明评分框架</h2><p>八个维度，百分制加权；硬门槛会限制最终得分。</p><div id="weights"></div><div class="notice"><b>使用边界</b><p>规则化初筛，不替代医学、法律、注册、投资或商业尽调。</p></div></aside></section><section id="report" class="report" hidden></section></main><footer><b>乐城生物技术评估器</b><span>重要决策前，请核对原始来源。</span></footer><script src="app.js"></script></body></html>
